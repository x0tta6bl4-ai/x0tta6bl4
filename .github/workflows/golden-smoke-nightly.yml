name: Golden Smoke Nightly

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

concurrency:
  group: golden-smoke-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-smoke-full:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-staging.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirements-staging.txt ]; then
            pip install -r requirements-staging.txt
          else
            pip install pytest pytest-asyncio pytest-cov pytest-xdist sqlalchemy alembic fastapi pydantic redis
          fi

      - name: Run golden smoke (full)
        env:
          PYTEST_TIMEOUT_SECONDS: "2400"
          ALEMBIC_TIMEOUT_SECONDS: "900"
        run: |
          bash scripts/golden_smoke_premerge.sh full
