name: Golden Smoke Nightly

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

concurrency:
  group: golden-smoke-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-smoke-full-core:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      start_iso: ${{ steps.timing_start.outputs.start_iso }}
      end_iso: ${{ steps.timing_end.outputs.end_iso }}
      duration_seconds: ${{ steps.timing_end.outputs.duration_seconds }}
      smoke_outcome: ${{ steps.smoke_run.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-staging.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirements-staging.txt ]; then
            pip install -r requirements-staging.txt
          else
            pip install pytest pytest-asyncio pytest-cov pytest-xdist sqlalchemy alembic fastapi pydantic redis
          fi

      - name: Start lane timer
        id: timing_start
        run: |
          start_ts="$(date +%s)"
          start_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "LANE_START_TS=$start_ts" >> "$GITHUB_ENV"
          echo "start_iso=$start_iso" >> "$GITHUB_OUTPUT"

      - name: Run golden smoke (full-core)
        id: smoke_run
        env:
          PYTEST_TIMEOUT_SECONDS: "2400"
          ALEMBIC_TIMEOUT_SECONDS: "900"
        run: |
          bash scripts/golden_smoke_premerge.sh full-core

      - name: Finalize lane timer
        id: timing_end
        if: always()
        run: |
          end_ts="$(date +%s)"
          end_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          start_ts="${LANE_START_TS:-$end_ts}"
          duration_seconds="$((end_ts - start_ts))"
          echo "end_iso=$end_iso" >> "$GITHUB_OUTPUT"
          echo "duration_seconds=$duration_seconds" >> "$GITHUB_OUTPUT"

      - name: Build lane metrics
        if: always()
        run: |
          mkdir -p artifacts
          cat > artifacts/golden-smoke-full-core-metrics.json <<EOF
          {
            "lane": "full-core",
            "outcome": "${{ steps.smoke_run.outcome }}",
            "start_iso": "${{ steps.timing_start.outputs.start_iso }}",
            "end_iso": "${{ steps.timing_end.outputs.end_iso }}",
            "duration_seconds": "${{ steps.timing_end.outputs.duration_seconds }}"
          }
          EOF

      - name: Upload lane metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-smoke-full-core-metrics
          path: artifacts/golden-smoke-full-core-metrics.json

  golden-smoke-full-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      start_iso: ${{ steps.timing_start.outputs.start_iso }}
      end_iso: ${{ steps.timing_end.outputs.end_iso }}
      duration_seconds: ${{ steps.timing_end.outputs.duration_seconds }}
      smoke_outcome: ${{ steps.smoke_run.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-staging.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirements-staging.txt ]; then
            pip install -r requirements-staging.txt
          else
            pip install pytest pytest-asyncio pytest-cov pytest-xdist sqlalchemy alembic fastapi pydantic redis
          fi

      - name: Start lane timer
        id: timing_start
        run: |
          start_ts="$(date +%s)"
          start_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "LANE_START_TS=$start_ts" >> "$GITHUB_ENV"
          echo "start_iso=$start_iso" >> "$GITHUB_OUTPUT"

      - name: Run golden smoke (full-heavy)
        id: smoke_run
        env:
          PYTEST_TIMEOUT_SECONDS: "3600"
          ALEMBIC_TIMEOUT_SECONDS: "900"
        run: |
          bash scripts/golden_smoke_premerge.sh full-heavy

      - name: Finalize lane timer
        id: timing_end
        if: always()
        run: |
          end_ts="$(date +%s)"
          end_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          start_ts="${LANE_START_TS:-$end_ts}"
          duration_seconds="$((end_ts - start_ts))"
          echo "end_iso=$end_iso" >> "$GITHUB_OUTPUT"
          echo "duration_seconds=$duration_seconds" >> "$GITHUB_OUTPUT"

      - name: Build lane metrics
        if: always()
        run: |
          mkdir -p artifacts
          cat > artifacts/golden-smoke-full-heavy-metrics.json <<EOF
          {
            "lane": "full-heavy",
            "outcome": "${{ steps.smoke_run.outcome }}",
            "start_iso": "${{ steps.timing_start.outputs.start_iso }}",
            "end_iso": "${{ steps.timing_end.outputs.end_iso }}",
            "duration_seconds": "${{ steps.timing_end.outputs.duration_seconds }}"
          }
          EOF

      - name: Upload lane metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-smoke-full-heavy-metrics
          path: artifacts/golden-smoke-full-heavy-metrics.json

  golden-smoke-nightly-gate:
    name: Nightly Gate Result
    runs-on: ubuntu-latest
    needs: [golden-smoke-full-core, golden-smoke-full-heavy]
    if: always()
    env:
      CORE_WARN_SECONDS: "3600"
      CORE_HARD_SECONDS: "5400"
      HEAVY_WARN_SECONDS: "4500"
      HEAVY_HARD_SECONDS: "7200"

    steps:
      - name: Validate nightly lanes
        run: |
          echo "core=${{ needs.golden-smoke-full-core.result }}"
          echo "heavy=${{ needs.golden-smoke-full-heavy.result }}"
          if [ "${{ needs.golden-smoke-full-core.result }}" != "success" ] || \
             [ "${{ needs.golden-smoke-full-heavy.result }}" != "success" ]; then
            echo "Nightly golden smoke failed"
            exit 1
          fi
          echo "Nightly golden smoke passed"

      - name: Build nightly duration summary
        if: always()
        run: |
          mkdir -p artifacts

          core_outcome="${{ needs.golden-smoke-full-core.outputs.smoke_outcome }}"
          core_duration="${{ needs.golden-smoke-full-core.outputs.duration_seconds }}"
          core_start="${{ needs.golden-smoke-full-core.outputs.start_iso }}"
          core_end="${{ needs.golden-smoke-full-core.outputs.end_iso }}"
          heavy_outcome="${{ needs.golden-smoke-full-heavy.outputs.smoke_outcome }}"
          heavy_duration="${{ needs.golden-smoke-full-heavy.outputs.duration_seconds }}"
          heavy_start="${{ needs.golden-smoke-full-heavy.outputs.start_iso }}"
          heavy_end="${{ needs.golden-smoke-full-heavy.outputs.end_iso }}"

          lane_status() {
            duration="$1"
            warn_s="$2"
            hard_s="$3"
            if ! [[ "$duration" =~ ^[0-9]+$ ]]; then
              echo "N/A"
              return 0
            fi
            if [ "$duration" -ge "$hard_s" ]; then
              echo "FAIL"
              return 0
            fi
            if [ "$duration" -ge "$warn_s" ]; then
              echo "WARN"
              return 0
            fi
            echo "PASS"
          }

          core_guard="$(lane_status "$core_duration" "$CORE_WARN_SECONDS" "$CORE_HARD_SECONDS")"
          heavy_guard="$(lane_status "$heavy_duration" "$HEAVY_WARN_SECONDS" "$HEAVY_HARD_SECONDS")"

          {
            echo "# Golden Smoke Nightly Duration Summary"
            echo
            echo "| Lane | Outcome | Duration (s) | Guardrail | Thresholds (warn/hard) | Start (UTC) | End (UTC) |"
            echo "|---|---|---:|---|---|---|---|"
            echo "| full-core | ${core_outcome:-n/a} | ${core_duration:-n/a} | ${core_guard} | ${CORE_WARN_SECONDS}/${CORE_HARD_SECONDS} | ${core_start:-n/a} | ${core_end:-n/a} |"
            echo "| full-heavy | ${heavy_outcome:-n/a} | ${heavy_duration:-n/a} | ${heavy_guard} | ${HEAVY_WARN_SECONDS}/${HEAVY_HARD_SECONDS} | ${heavy_start:-n/a} | ${heavy_end:-n/a} |"
            echo
            echo "Guardrail status legend: PASS, WARN, FAIL, N/A."
            echo "Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > artifacts/golden-smoke-nightly-summary.md

          cat > artifacts/golden-smoke-nightly-summary.json <<EOF
          {
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "lanes": [
              {
                "name": "full-core",
                "outcome": "${core_outcome:-n/a}",
                "duration_seconds": "${core_duration:-n/a}",
                "guardrail_status": "${core_guard}",
                "start_iso": "${core_start:-n/a}",
                "end_iso": "${core_end:-n/a}",
                "thresholds": {
                  "warn_seconds": "${CORE_WARN_SECONDS}",
                  "hard_seconds": "${CORE_HARD_SECONDS}"
                }
              },
              {
                "name": "full-heavy",
                "outcome": "${heavy_outcome:-n/a}",
                "duration_seconds": "${heavy_duration:-n/a}",
                "guardrail_status": "${heavy_guard}",
                "start_iso": "${heavy_start:-n/a}",
                "end_iso": "${heavy_end:-n/a}",
                "thresholds": {
                  "warn_seconds": "${HEAVY_WARN_SECONDS}",
                  "hard_seconds": "${HEAVY_HARD_SECONDS}"
                }
              }
            ]
          }
          EOF

          cat artifacts/golden-smoke-nightly-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce duration guardrails
        if: always()
        run: |
          core_duration="${{ needs.golden-smoke-full-core.outputs.duration_seconds }}"
          heavy_duration="${{ needs.golden-smoke-full-heavy.outputs.duration_seconds }}"
          guard_failed=0

          lane_status() {
            duration="$1"
            warn_s="$2"
            hard_s="$3"
            if ! [[ "$duration" =~ ^[0-9]+$ ]]; then
              echo "N/A"
              return 0
            fi
            if [ "$duration" -ge "$hard_s" ]; then
              echo "FAIL"
              return 0
            fi
            if [ "$duration" -ge "$warn_s" ]; then
              echo "WARN"
              return 0
            fi
            echo "PASS"
          }

          check_lane() {
            lane="$1"
            duration="$2"
            warn_s="$3"
            hard_s="$4"
            status="$(lane_status "$duration" "$warn_s" "$hard_s")"

            if [ "$status" = "N/A" ]; then
              echo "::warning::${lane} duration is unavailable (${duration}); skipping guardrail check"
              return 0
            fi

            if [ "$status" = "FAIL" ]; then
              echo "::error::${lane} duration ${duration}s exceeded hard threshold ${hard_s}s"
              guard_failed=1
              return 0
            fi

            if [ "$status" = "WARN" ]; then
              echo "::warning::${lane} duration ${duration}s exceeded warning threshold ${warn_s}s"
              return 0
            fi

            echo "${lane} duration ${duration}s is within guardrails (warn=${warn_s}s, hard=${hard_s}s)"
          }

          check_lane "full-core" "$core_duration" "$CORE_WARN_SECONDS" "$CORE_HARD_SECONDS"
          check_lane "full-heavy" "$heavy_duration" "$HEAVY_WARN_SECONDS" "$HEAVY_HARD_SECONDS"

          if [ "$guard_failed" -ne 0 ]; then
            echo "Duration guardrails failed"
            exit 1
          fi

      - name: Upload nightly summary artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-smoke-nightly-summary
          path: |
            artifacts/golden-smoke-nightly-summary.md
            artifacts/golden-smoke-nightly-summary.json
