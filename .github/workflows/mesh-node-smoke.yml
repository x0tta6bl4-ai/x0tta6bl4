name: Mesh Node Smoke Baseline

on:
  push:
    paths:
      - 'deploy/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'deploy/**'
      - 'scripts/**'

jobs:
  mesh-node-baseline:
    name: Mesh Node Baseline Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate deploy YAML files
        run: |
          python - <<'PY'
          import pathlib, sys, yaml
          errors = []
          for path in pathlib.Path('deploy').rglob('*.yml'):
              try:
                  yaml.safe_load(path.read_text())
              except Exception as exc:
                  errors.append(f"{path}: {exc}")
          if errors:
              print("YAML validation failed:")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)
          print("YAML validation passed.")
          PY

      - name: Lint changed shell scripts (static)
        if: always()
        run: |
          set -e
          mapfile -t files < <(git diff --name-only --diff-filter=AM origin/${{ github.base_ref || 'main' }} HEAD -- scripts | grep -E '\.sh$' || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell script changes to lint."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Linting $f"
            bash -n "$f"
          done
          echo "Shell static checks passed."

      - name: Compile changed Python scripts (static)
        if: always()
        run: |
          set -e
          mapfile -t files < <(git diff --name-only --diff-filter=AM origin/${{ github.base_ref || 'main' }} HEAD -- scripts deploy | grep -E '\.py$' || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Python script changes to compile-check."
            exit 0
          fi
          python -m py_compile "${files[@]}"
          echo "Python static compile checks passed."

      - name: HTTP smoke check against localhost metrics (opt-in)
        if: ${{ vars.MESH_NODE_OPT_IN_PRIVILEGED == 'true' && env.MESH_NODE_SMOKE_URL != '' }}
        env:
          MESH_NODE_SMOKE_URL: ${{ vars.MESH_NODE_SMOKE_URL }}
        run: |
          set -e
          echo "Running bounded HTTP smoke checks against: $MESH_NODE_SMOKE_URL"
          curl --fail --max-time 5 -sSf "$MESH_NODE_SMOKE_URL/health" || true
          curl --fail --max-time 5 -sSf "$MESH_NODE_SMOKE_URL/metrics" || true
          echo "HTTP smoke checks completed."

      - name: Run local multi-node smoke test (opt-in)
        if: ${{ vars.MESH_NODE_OPT_IN_PRIVILEGED == 'true' }}
        env:
          LOCAL_SMOKE_CHECK_LISTENERS: 1
          LOCAL_SMOKE_HEALTH_SCORE: 20.0
          LOCAL_SMOKE_WAIT_TIMEOUT: 60
          NODE_A_PORT: 9190
          NODE_B_PORT: 9191
        run: |
          set -e
          echo "Waiting for mesh-node on :${NODE_A_PORT}..."
          for i in $(seq 1 60); do
            if curl -sS -o /dev/null -w '%{http_code}' --max-time 2 "http://localhost:${NODE_A_PORT}/metrics" 2>/dev/null | grep -q '^200$'; then
              echo "mesh-node responsive on :${NODE_A_PORT}"
              break
            fi
            if [[ "$i" == "60" ]]; then
              echo "Timed out waiting for mesh-node on :${NODE_A_PORT}" >&2
              exit 1
            fi
            sleep 1
          done

          echo "Waiting for mesh-node-2 on :${NODE_B_PORT}..."
          for i in $(seq 1 60); do
            if curl -sS -o /dev/null -w '%{http_code}' --max-time 2 "http://localhost:${NODE_B_PORT}/metrics" 2>/dev/null | grep -q '^200$'; then
              echo "mesh-node-2 responsive on :${NODE_B_PORT}"
              break
            fi
            if [[ "$i" == "60" ]]; then
              echo "Timed out waiting for mesh-node-2 on :${NODE_B_PORT}" >&2
              exit 1
            fi
            sleep 1
          done

          echo "Asserting baseline metrics for both nodes..."
          for port in ${NODE_A_PORT} ${NODE_B_PORT}; do
            url="http://localhost:${port}/metrics"
            body="$(mktemp)"
            http_code="$(curl -sS -o "${body}" -w '%{http_code}' --max-time 5 "${url}")" || true
            if [[ "${http_code}" != "200" ]]; then
              echo "[FAIL] Expected HTTP 200 from ${url}, got ${http_code}" >&2
              exit 1
            fi
            echo "[PASS] ${url} returned HTTP ${http_code}"

            if ! grep -Fq 'mesh_health_score' "${body}"; then
              echo "[FAIL] mesh_health_score not found in ${url}" >&2
              exit 1
            fi
            echo "[PASS] ${url} contains mesh_health_score"

            score="$(grep -E '^mesh_health_score[[:space:]]+' "${body}" | tail -n1 | awk '{print $2}')" || true
            if [[ "${score}" != "20.0" ]]; then
              echo "[FAIL] ${url}: expected mesh_health_score=20.0, got ${score}" >&2
              exit 1
            fi
            echo "[PASS] ${url} mesh_health_score=${score}"

            established="$(grep -E '^mesh_established_sessions[[:space:]]+' "${body}" | tail -n1 | awk '{print $2}')" || true
            if [[ "${established}" != "0" ]]; then
              echo "[FAIL] ${url}: expected mesh_established_sessions=0, got ${established}" >&2
              exit 1
            fi
            echo "[PASS] ${url} mesh_established_sessions=${established}"

            rm -f "${body}"
          done

          echo "Multi-node baseline smoke assertions passed."

      - name: Skip privileged container orchestration by default
        if: ${{ vars.MESH_NODE_OPT_IN_PRIVILEGED != 'true' }}
        run: |
          echo "Privileged container orchestration is disabled in this environment."
          echo "To enable, set the repository variable MESH_NODE_OPT_IN_PRIVILEGED=true."
          echo "This workflow intentionally skips docker-compose up / container build steps."
