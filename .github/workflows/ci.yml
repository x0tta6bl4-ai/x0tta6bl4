name: Unit Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff bandit

      - name: Ruff lint
        run: ruff check src/ --output-format=github || true

      - name: Bandit security scan
        run: bandit -r src/security/ src/self_healing/ src/core/security/ -ll -q

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --no-build-isolation
          pip install pytest pytest-asyncio pytest-mock

      - name: Run security tests
        run: |
          python3 -m pytest tests/unit/security/ -q --tb=short \
            -p no:cacheprovider -p no:cov \
            -x --maxfail=5

      - name: Run self-healing tests
        run: |
          python3 -m pytest tests/unit/self_healing/ -q --tb=short \
            -p no:cacheprovider -p no:cov \
            -x --maxfail=5

      - name: Run core tests
        run: |
          python3 -m pytest tests/unit/core/ -q --tb=short \
            -p no:cacheprovider -p no:cov \
            -x --maxfail=5

      - name: Compile check critical modules
        run: |
          python3 -m py_compile src/self_healing/svid_signer.py
          python3 -m py_compile src/self_healing/anomaly_consensus.py
          python3 -m py_compile src/self_healing/signed_command.py
          python3 -m py_compile src/core/security/subprocess_validator.py
          python3 -m py_compile src/security/pqc/kem.py
          python3 -m py_compile src/security/pqc/dsa.py
