name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  db-bootstrap-chain:
    name: DB Bootstrap Chain
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: x0tta6bl4
          POSTGRES_PASSWORD: x0tta6bl4
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U x0tta6bl4 -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install DB bootstrap dependencies
      run: |
        python -m pip install --upgrade pip
        # Full dependency set mirrors the test job to avoid iterative import failures
        pip install alembic SQLAlchemy python-dotenv psycopg2-binary \
                    prometheus-client structlog pydantic pydantic-settings \
                    cryptography redis psutil slowapi hvac PyJWT httpx \
                    fastapi starlette bcrypt aiohttp stripe

    - name: Validate DB bootstrap chain (SQLite + PostgreSQL)
      env:
        POSTGRES_BOOTSTRAP_DATABASE_URL: "postgresql://x0tta6bl4:x0tta6bl4@localhost:5432/postgres"
      run: |
        python scripts/check_db_bootstrap_chain.py --require-postgres --validate-downgrade --downgrade-steps 3 --timeout-seconds 600

    - name: Validate migration policy (idempotent style + nullable transitions)
      run: |
        python scripts/check_migration_policy.py --depth 3

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    env:
      # Allow CI to run without liboqs (dev fallback mode).
      # WARNING: Production deployments MUST have PQC_FAIL_CLOSED=true
      PQC_FAIL_CLOSED: "false"

    steps:
    - uses: actions/checkout@v4

    - name: Validate pipeline stage contract
      run: |
        python scripts/check_pipeline_stage_contract.py

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Core test dependencies (keep lightweight — no liboqs/BCC/torch)
        pip install pytest pytest-cov pytest-asyncio pytest-mock ruff mypy hvac PyJWT \
                    httpx fastapi starlette pydantic pydantic-settings sqlalchemy alembic \
                    redis cryptography python-dotenv prometheus-client structlog psutil \
                    stripe slowapi aiohttp bcrypt

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/ || echo "Ruff warnings found (non-blocking)"

    - name: Type check with mypy
      run: |
        pip install mypy
        mypy src/ --ignore-missing-imports || echo "Mypy warnings found (non-blocking)"

    - name: Test with pytest
      env:
        # Test-only secrets (not real production values)
        GENEVA_MASTER_KEY: "ci_test_key_do_not_use_in_production_32b"
        VPN_SERVER: "127.0.0.1"
        VPN_PORT: "39829"
        # PQC: Allow CI to run without liboqs (dev fallback mode)
        # WARNING: Production deployments MUST have PQC_FAIL_CLOSED=true
        PQC_FAIL_CLOSED: "false"
      run: |
        pytest tests/unit/core/test_health.py -v --tb=short --junitxml=junit.xml --cov=src --cov-report=xml --cov-fail-under=0

    - name: Validate runtime API contracts
      run: |
        python scripts/validate_runtime_contracts.py

    - name: Validate API model backward/forward compatibility
      run: |
        python scripts/check_api_model_compat.py

    - name: Validate env security defaults
      run: |
        python scripts/check_env_security_defaults.py

    - name: Validate local MaaS agent mesh bot
      run: |
        pytest -q tests/unit/agents/test_maas_health_bot_unit.py tests/unit/api/test_maas_agent_mesh_unit.py --no-cov

    - name: Validate version contract
      run: |
        python scripts/validate_version_contract.py

    - name: Validate production env contract
      run: |
        python scripts/validate_production_env_contract.py || echo "Production env contract warnings (non-blocking in CI)"

    - name: Validate enterprise workflow policy
      run: |
        python scripts/validate_enterprise_workflows.py

    - name: Upload coverage
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run security scan
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit
        mkdir -p reports/sast
        # Security scan is informational in CI; failures are reported but do not block delivery.
        set +e
        bandit -r src/ -lll -iii -f json -o reports/sast/bandit-report.json \
          --exclude src/dao/contracts
        bandit_status=$?
        safety check -r requirements.txt --output json > reports/sast/safety-report.json
        safety_status=$?
        pip-audit -r requirements.lock --no-deps --disable-pip -f json \
          -o reports/sast/pip-audit-report.json
        audit_status=$?
        set -e
        echo "bandit_status=${bandit_status}"
        echo "safety_status=${safety_status}"
        echo "pip_audit_status=${audit_status}"

    - name: JS dependency audit (npm audit)
      run: |
        set +e
        mkdir -p reports/sast
        if [ -f src/dao/contracts/package-lock.json ]; then
          cd src/dao/contracts
          npm audit --json > ../../../reports/sast/npm-audit-contracts.json 2>&1
          npm_status=$?
          cd -
          # Fail if critical/high vulnerabilities found
          python3 -c "import json,sys; d=json.load(open('reports/sast/npm-audit-contracts.json')); m=d.get('metadata',{}).get('vulnerabilities',{}); n=m.get('critical',0)+m.get('high',0); print(f'npm audit critical/high: {n}'); sys.exit(1 if n>0 else 0)" 
        else
          echo '[SKIP] src/dao/contracts/package-lock.json not found'
        fi
        set -e

    - name: Upload SAST reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sast-reports
        path: reports/sast/
        retention-days: 30

    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        extra_args: --only-verified

  spire-integration:
    name: SPIRE Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install SPIRE test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-mock spiffe \
                    httpx fastapi starlette pydantic pydantic-settings \
                    prometheus-client structlog cryptography python-dotenv \
                    sqlalchemy redis psutil PyJWT

    - name: Start SPIRE infrastructure
      run: |
        chmod +x scripts/spire/start-spire.sh
        bash scripts/spire/start-spire.sh

    - name: Verify SPIRE containers and socket
      run: |
        docker compose -f docker-compose.spire.yml ps
        ls -la /tmp/spire-agent/public/api.sock

    - name: Run SPIRE integration tests
      run: |
        pytest tests/integration/test_spire_integration.py -q -rs --override-ini addopts=''

    - name: Dump SPIRE logs on failure
      if: failure()
      run: |
        docker compose -f docker-compose.spire.yml logs --no-color spire-server spire-agent || true

    - name: Cleanup SPIRE
      if: always()
      run: |
        docker compose -f docker-compose.spire.yml down -v --remove-orphans || true
