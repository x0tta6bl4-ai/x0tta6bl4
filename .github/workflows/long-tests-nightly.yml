name: Long Tests Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: long-tests-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  long-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: marketplace
            spec: "tests/api/test_maas_marketplace.py"
          - lane: escrow
            spec: "tests/api/test_maas_escrow.py"
          - lane: governance
            spec: "tests/api/test_maas_governance.py"
          - lane: governance-edge
            spec: "tests/api/test_maas_governance_edge.py"
          - lane: mesh-fl
            spec: "tests/test_mesh_fl_integration.py"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-staging.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirements-staging.txt ]; then
            pip install -r requirements-staging.txt
          else
            pip install pytest pytest-asyncio pytest-cov pytest-xdist sqlalchemy alembic fastapi pydantic redis
          fi

      - name: Run long test lane
        env:
          PYTEST_TIMEOUT_SECONDS: "3600"
        run: |
          timeout "${PYTEST_TIMEOUT_SECONDS}s" pytest -q ${{ matrix.spec }} --no-cov
