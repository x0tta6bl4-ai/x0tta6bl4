name: Tests

on:
  push:
    branches: [main, develop, sync-main-*]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" 2>/dev/null || pip install \
          pytest pytest-asyncio pytest-cov pytest-mock \
          prometheus-client structlog pydantic pydantic-settings \
          cryptography redis psutil slowapi hvac PyJWT httpx \
          fastapi starlette bcrypt aiohttp psutil \
          python-dotenv sqlalchemy numpy

    - name: Run tests
      run: |
        python3 -m pytest \
          tests/unit/test_core_importable.py \
          tests/unit/test_core_importable_extended.py \
          tests/unit/test_monitoring_optimization_security.py \
          tests/unit/test_security_policy_engine.py \
          tests/unit/test_monitoring_optimization_full.py \
          tests/unit/test_security_modules.py \
          tests/unit/test_remaining_modules.py \
          tests/integration/test_cross_module_integration.py \
          tests/e2e/test_end_to_end.py \
          -v --tb=short --no-header \
          --override-ini="testpaths=." \
          --cov=src --cov-report=xml --cov-report=term-missing

    - name: Verify coverage
      run: |
        python3 -c "
        import xml.etree.ElementTree as ET
        import sys
        try:
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            coverage = float(root.get('line-rate')) * 100
            print(f'Coverage: {coverage:.1f}%')
        except Exception as e:
            print(f'Coverage check skipped: {e}')
        "

    - name: Upload coverage
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: tests
        fail_ci_if_error: false
      if: always()
