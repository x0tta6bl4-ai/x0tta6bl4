name: Golden Smoke Pre-Merge

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "alembic/**"
      - "scripts/golden_smoke_premerge.sh"
      - ".github/workflows/golden-smoke-premerge.yml"
  workflow_dispatch:

concurrency:
  group: golden-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-smoke-quick:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-staging.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirements-staging.txt ]; then
            pip install -r requirements-staging.txt
          else
            pip install pytest pytest-asyncio pytest-cov pytest-xdist sqlalchemy alembic fastapi pydantic redis
          fi

      - name: Run golden smoke (quick)
        env:
          PYTEST_TIMEOUT_SECONDS: "2400"
          ALEMBIC_TIMEOUT_SECONDS: "600"
        run: |
          bash scripts/golden_smoke_premerge.sh quick
