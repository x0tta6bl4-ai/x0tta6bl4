name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --no-build-isolation

      - name: Compile check
        run: |
          python3 -m py_compile src/self_healing/svid_signer.py
          python3 -m py_compile src/self_healing/anomaly_consensus.py
          python3 -m py_compile src/self_healing/signed_command.py
          python3 -m py_compile src/core/security/subprocess_validator.py

      - name: Run core tests
        run: |
          python3 -m pytest tests/unit/self_healing/test_svid_signer.py \
            tests/unit/self_healing/test_anomaly_consensus.py \
            tests/unit/self_healing/test_spire_crash_chaos.py \
            -v --tb=short -c /dev/null -p no:cacheprovider -p no:cov

      - name: Build Docker
        run: |
          docker build --no-cache -t mesh-node:latest -f deploy/docker-compose/Dockerfile.mesh .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Bandit security scan
        run: bandit -r src/self_healing/ src/security/ src/core/security/ -f json
