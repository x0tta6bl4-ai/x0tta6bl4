name: Native App Builds

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - ".github/workflows/native-app-builds.yml"
      - "src-tauri/**"
      - "x0tta6bl4-app/**"
  pull_request:
    branches: [ main, develop ]
    paths:
      - ".github/workflows/native-app-builds.yml"
      - "src-tauri/**"
      - "x0tta6bl4-app/**"

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install web dependencies
        working-directory: x0tta6bl4-app
        run: npm install

      - name: Build Android debug APK
        working-directory: x0tta6bl4-app
        run: npm run android:build

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: x0tta6bl4-android-debug-apk
          path: x0tta6bl4-app/android/app/build/outputs/apk/debug/app-debug.apk

  ubuntu-desktop:
    name: Ubuntu Desktop
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install web dependencies
        working-directory: x0tta6bl4-app
        run: npm install

      - name: Build Ubuntu desktop bundles
        working-directory: x0tta6bl4-app
        run: npm run desktop:build:linux

      - name: Upload Ubuntu bundles
        uses: actions/upload-artifact@v4
        with:
          name: x0tta6bl4-ubuntu-desktop
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  windows-desktop:
    name: Windows Desktop MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install web dependencies
        working-directory: x0tta6bl4-app
        run: npm install

      - name: Build Windows MSI
        working-directory: x0tta6bl4-app
        run: npm run desktop:build:windows

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: x0tta6bl4-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  ios-simulator:
    name: iOS Simulator Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install web dependencies
        working-directory: x0tta6bl4-app
        run: npm install

      - name: Sync iOS native project
        working-directory: x0tta6bl4-app
        run: npm run ios:sync

      - name: Build unsigned iOS simulator app
        working-directory: x0tta6bl4-app/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: x0tta6bl4-ios-simulator-app
          path: x0tta6bl4-app/ios/App/build/Build/Products/Debug-iphonesimulator/App.app
