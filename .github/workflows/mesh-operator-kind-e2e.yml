name: Mesh Operator Kind E2E

on:
  push:
    branches: [main, develop]
    paths:
      - "mesh-operator/**"
      - "charts/x0tta-mesh-operator/**"
      - "scripts/ops/bootstrap_k8s_dev.sh"
      - "scripts/ops/check_mesh_images_reproducibility.sh"
      - "scripts/ops/ensure_mesh_operator_image.sh"
      - "scripts/ops/ensure_mesh_node_image.sh"
      - "scripts/ops/mesh_operator_kind_e2e.sh"
      - "scripts/ops/mesh_operator_webhook_admission_e2e.sh"
      - "scripts/ops/mesh_operator_helm_lifecycle_e2e.sh"
      - "scripts/ops/mesh_operator_canary_rollback_e2e.sh"
      - "scripts/ops/mesh_operator_fallback_manager/**"
      - "scripts/ops/mesh_node_fallback_manager/**"
      - "docker/mesh-operator-fallback/**"
      - "docker/mesh-node/**"
      - "src/libx0t/network/**"
      - ".github/workflows/mesh-operator-kind-e2e.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "mesh-operator/**"
      - "charts/x0tta-mesh-operator/**"
      - "scripts/ops/bootstrap_k8s_dev.sh"
      - "scripts/ops/check_mesh_images_reproducibility.sh"
      - "scripts/ops/ensure_mesh_operator_image.sh"
      - "scripts/ops/ensure_mesh_node_image.sh"
      - "scripts/ops/mesh_operator_kind_e2e.sh"
      - "scripts/ops/mesh_operator_webhook_admission_e2e.sh"
      - "scripts/ops/mesh_operator_helm_lifecycle_e2e.sh"
      - "scripts/ops/mesh_operator_canary_rollback_e2e.sh"
      - "scripts/ops/mesh_operator_fallback_manager/**"
      - "scripts/ops/mesh_node_fallback_manager/**"
      - "docker/mesh-operator-fallback/**"
      - "docker/mesh-node/**"
      - "src/libx0t/network/**"
      - ".github/workflows/mesh-operator-kind-e2e.yml"
  workflow_dispatch:

concurrency:
  group: mesh-operator-kind-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind-e2e:
    name: Kind E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CLUSTER_NAME: ci-mesh-operator
      K8S_NAMESPACE: x0tta-system
      HELM_RELEASE: mesh-op
      TIMEOUT_SECONDS: "300"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: mesh-operator/go.mod

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.5"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "v3.15.4"

      - name: Install kind
        run: |
          curl -fsSL -o ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Run mesh-operator unit tests
        run: |
          cd mesh-operator
          go test ./...

      - name: Check reproducible fallback image builds
        run: |
          bash scripts/ops/check_mesh_images_reproducibility.sh

      - name: Render chart with webhook mode
        run: |
          helm template mesh-op charts/x0tta-mesh-operator \
            --namespace x0tta-system \
            --set operator.webhook.enabled=true \
            --set operator.webhook.certManager.enabled=true >/tmp/mesh-operator-webhook-render.yaml

      - name: Run mesh-operator kind e2e smoke
        run: |
          bash scripts/ops/mesh_operator_kind_e2e.sh

      - name: Run mesh-operator webhook admission e2e
        run: |
          bash scripts/ops/mesh_operator_webhook_admission_e2e.sh

      - name: Run mesh-operator helm lifecycle e2e
        run: |
          HELM_RELEASE=mesh-op-lifecycle \
          K8S_NAMESPACE=x0tta-system \
          bash scripts/ops/mesh_operator_helm_lifecycle_e2e.sh

      - name: Run mesh-operator canary rollback e2e
        run: |
          HELM_RELEASE=mesh-op-canary \
          K8S_NAMESPACE=x0tta-system \
          MAX_ROLLBACK_SECONDS=600 \
          bash scripts/ops/mesh_operator_canary_rollback_e2e.sh

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl get pods -A -o wide || true
          kubectl get meshclusters.x0tta6bl4.io -A || true
          kubectl -n x0tta-system logs deployment/mesh-op-x0tta-mesh-operator --tail=200 || true

      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name "${CLUSTER_NAME}" || true
