name: Chaos Resilience Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'infra/chaos/**'
      - 'scripts/ops/mttr_chaos_report.py'
      - 'tests/unit/monitoring/test_mttr_chaos_report_unit.py'
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Chaos scenario to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - pod-kill
          - network-delay
          - network-partition
          - cpu-stress
          - memory-stress

env:
  CLUSTER_NAME: x0tta6bl4-chaos
  NAMESPACE: x0tta6bl4
  PROMETHEUS_URL: http://prometheus:9090

jobs:
  setup-cluster:
    runs-on: ubuntu-latest
    outputs:
      cluster-ready: ${{ steps.cluster.outputs.ready }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Kind Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          config: kind-chaos-ci-config.yaml
          version: v0.26.0
          kubectl_version: v1.30.6
          wait: 120s
      
      - name: Install Chaos Mesh
        run: |
          helm repo add chaos-mesh https://charts.chaos-mesh.org
          helm install chaos-mesh chaos-mesh/chaos-mesh \
            --namespace=chaos-mesh \
            --create-namespace \
            --set chaosDaemon.runtime=containerd \
            --set chaosDaemon.socketPath=/run/containerd/containerd.sock
          
          # Wait for Chaos Mesh
          kubectl wait --for=condition=Ready pods -l app.kubernetes.io/instance=chaos-mesh \
            -n chaos-mesh --timeout=300s
      
      - name: Deploy x0tta6bl4 Mesh
        continue-on-error: ${{ github.ref == 'refs/heads/develop' }}
        run: |
          helm install mesh ./infra/helm/x0tta6bl4 \
            --namespace=${{ env.NAMESPACE }} \
            --create-namespace \
            --set mesh.replicaCount=1 \
            --set mesh.persistence.enabled=false \
            --set spiffe.enabled=false \
            --set obfuscation.enabled=false \
            --set zeroTrust.enabled=true \
            --set prometheus.enabled=false \
            --set grafana.enabled=false \
            --set alertmanager.enabled=false \
            --wait --timeout=5m
      
      - id: cluster
        run: |
          if kubectl rollout status deploy/mesh-x0tta6bl4 -n "${{ env.NAMESPACE }}" --timeout=120s; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            # Keep develop resilient to flaky/non-critical cluster setup.
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              exit 1
            fi
          fi

  chaos-pod-kill:
    needs: setup-cluster
    if: ${{ needs.setup-cluster.outputs.cluster-ready == 'true' && (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'pod-kill' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Apply Pod Kill Chaos
        run: |
          kubectl apply -f infra/chaos/pod-chaos.yaml
          sleep 10
      
      - name: Monitor Recovery
        id: monitor
        run: |
          # Wait for chaos to take effect
          sleep 30
          
          # Query MTTR from Prometheus
          MTTR=$(curl -s "${{ env.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode 'query=quantile_over_time(0.95, mesh_recovery_time_seconds[5m])' \
            | jq -r '.data.result[0].value[1] // "N/A"')
          
          echo "mttr=$MTTR" >> $GITHUB_OUTPUT
          echo "📊 P95 MTTR: ${MTTR}s"
      
      - name: Validate SLO
        run: |
          MTTR="${{ steps.monitor.outputs.mttr }}"
          if [[ "$MTTR" != "N/A" ]] && (( $(echo "$MTTR > 10" | bc -l) )); then
            echo "❌ SLO Violation: MTTR ${MTTR}s > 10s threshold"
            exit 1
          fi
          echo "✅ SLO Met: MTTR within acceptable range"
      
      - name: Cleanup
        if: always()
        run: kubectl delete -f infra/chaos/pod-chaos.yaml --ignore-not-found

  chaos-network:
    needs: setup-cluster
    if: ${{ needs.setup-cluster.outputs.cluster-ready == 'true' && (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'network-delay' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Apply Network Chaos
        run: |
          kubectl apply -f infra/chaos/network-chaos.yaml
          sleep 10
      
      - name: Monitor Latency Impact
        run: |
          # Monitor for 60 seconds
          for i in {1..6}; do
            LATENCY=$(curl -s "${{ env.PROMETHEUS_URL }}/api/v1/query" \
              --data-urlencode 'query=histogram_quantile(0.99, mesh_request_latency_bucket)' \
              | jq -r '.data.result[0].value[1] // "N/A"')
            echo "📊 P99 Latency at ${i}0s: ${LATENCY}ms"
            sleep 10
          done
      
      - name: Validate Mesh Connectivity
        run: |
          # Check all nodes can still communicate
          CONNECTED=$(kubectl exec -n ${{ env.NAMESPACE }} deploy/mesh-x0tta6bl4 -- \
            curl -s localhost:8080/api/mesh/connectivity | jq '.connected_nodes')
          
          TOTAL=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app.kubernetes.io/name=x0tta6bl4 --no-headers | wc -l)
          
          if [[ "$CONNECTED" -lt $(($TOTAL * 80 / 100)) ]]; then
            echo "❌ Connectivity dropped below 80%: $CONNECTED/$TOTAL"
            exit 1
          fi
          echo "✅ Mesh connectivity maintained: $CONNECTED/$TOTAL nodes"
      
      - name: Cleanup
        if: always()
        run: kubectl delete -f infra/chaos/network-chaos.yaml --ignore-not-found

  chaos-stress:
    needs: setup-cluster
    if: ${{ needs.setup-cluster.outputs.cluster-ready == 'true' && (github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'cpu-stress' || github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Apply Stress Chaos
        run: |
          kubectl apply -f infra/chaos/stress-chaos.yaml
          sleep 10
      
      - name: Monitor Resource Usage
        run: |
          # Monitor CPU and Memory during stress
          kubectl top pods -n ${{ env.NAMESPACE }} -l app.kubernetes.io/name=x0tta6bl4
      
      - name: Validate Service Availability
        run: |
          # Health check during stress
          for i in {1..5}; do
            STATUS=$(kubectl exec -n ${{ env.NAMESPACE }} deploy/mesh-x0tta6bl4 -- \
              curl -s -o /dev/null -w "%{http_code}" localhost:8080/health)
            
            if [[ "$STATUS" != "200" ]]; then
              echo "⚠️ Health check failed at iteration $i: HTTP $STATUS"
            else
              echo "✅ Health check passed at iteration $i"
            fi
            sleep 10
          done
      
      - name: Cleanup
        if: always()
        run: kubectl delete -f infra/chaos/stress-chaos.yaml --ignore-not-found

  # --------------------------------------------------------------------------
  # MTTR Chaos Report — synthetic CI gate (no cluster required)
  # --------------------------------------------------------------------------
  mttr-chaos-report:
    name: MTTR chaos report (synthetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run MTTR unit tests (no cluster)
        run: |
          python -m pytest tests/unit/monitoring/test_mttr_chaos_report_unit.py \
            --no-cov -q 2>&1 | tee /tmp/mttr-unit.txt
          grep -E "passed|failed|error" /tmp/mttr-unit.txt | tail -3

      - name: Generate MTTR chaos report (synthetic-ci mode)
        run: |
          MTTR_SEED=${{ github.run_number }} \
          python scripts/ops/mttr_chaos_report.py \
            --output /tmp/mttr-chaos-report.json \
            --markdown /tmp/mttr-chaos-report.md
          cat /tmp/mttr-chaos-report.md >> $GITHUB_STEP_SUMMARY

      - name: Validate SLO gate
        run: |
          python - <<'PYEOF'
          import json, sys
          r = json.load(open("/tmp/mttr-chaos-report.json"))
          s = r["summary"]
          print(f"MTTR={s['mttr_s']}s  MTTD={s['mttd_s']}s  heal_rate={s['heal_rate_pct']}%")
          if not s["mttr_slo_pass"]:
              print(f"FAIL: MTTR {s['mttr_s']}s exceeds SLO {r['slo_mttr_s']}s", file=sys.stderr)
              sys.exit(2)
          if s["failed_to_heal"] > 0:
              print(f"WARN: {s['failed_to_heal']} scenario(s) did not heal")
          print("SLO PASS")
          PYEOF

      - name: Upload MTTR artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mttr-chaos-report-${{ github.sha }}
          path: |
            /tmp/mttr-chaos-report.json
            /tmp/mttr-chaos-report.md
            /tmp/mttr-unit.txt
          retention-days: 90

  report:
    needs: [chaos-pod-kill, chaos-network, chaos-stress, mttr-chaos-report]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Report
        run: |
          echo "# Chaos Testing Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scenario | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pod Kill | ${{ needs.chaos-pod-kill.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Network Chaos | ${{ needs.chaos-network.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stress Test | ${{ needs.chaos-stress.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
      
      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Chaos testing revealed resilience issues. Review logs for details."
