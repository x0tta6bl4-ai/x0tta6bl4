name: Green Baseline

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/green-baseline.yml"
      - "docs/00-getting-started/green-baseline.md"
      - "requirements.txt"
      - "requirements.lock"
      - "requirements-staging.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "scripts/check_env_security_defaults.py"
      - "scripts/check_requirements_lock_sync.py"
      - "scripts/**/*.sh"
      - "src/api/**"
      - "src/core/**"
      - "src/network/**"
      - "src/security/**"
      - "src/self_healing/**"
      - "src/sales/**"
      - "src/libx0t/core/**"
      - "src/libx0t/security/**"
      - "tests/unit/security/test_dependency_security_pins_unit.py"
      - "tests/unit/scripts/test_check_env_security_defaults_unit.py"
      - "docker/mesh-node/requirements.txt"
      - "monitoring/geo-leak-detector/requirements.txt"
      - "x0tta6bl4-core-skill/x0tta6bl4-core/scripts/update_dependencies.sh"
      - "x0tta6bl4-core-skill/x0tta6bl4-core/references/technical_debt_plan.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/green-baseline.yml"
      - "docs/00-getting-started/green-baseline.md"
      - "requirements.txt"
      - "requirements.lock"
      - "requirements-staging.txt"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "scripts/check_env_security_defaults.py"
      - "scripts/check_requirements_lock_sync.py"
      - "scripts/**/*.sh"
      - "src/api/**"
      - "src/core/**"
      - "src/network/**"
      - "src/security/**"
      - "src/self_healing/**"
      - "src/sales/**"
      - "src/libx0t/core/**"
      - "src/libx0t/security/**"
      - "tests/unit/security/test_dependency_security_pins_unit.py"
      - "tests/unit/scripts/test_check_env_security_defaults_unit.py"
      - "docker/mesh-node/requirements.txt"
      - "monitoring/geo-leak-detector/requirements.txt"
      - "x0tta6bl4-core-skill/x0tta6bl4-core/scripts/update_dependencies.sh"
      - "x0tta6bl4-core-skill/x0tta6bl4-core/references/technical_debt_plan.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: green-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  green-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock
            requirements-staging.txt

      - name: Install baseline test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest packaging

      - name: Run dependency security guard
        run: python3 -m pytest --confcutdir=tests/unit/security tests/unit/security/test_dependency_security_pins_unit.py -q -o addopts=''

      - name: Run env security defaults audit
        run: python3 scripts/check_env_security_defaults.py

      - name: Run requirements lock sync
        run: python3 scripts/check_requirements_lock_sync.py

      - name: Check whitespace
        run: git diff --check
