{{- $tenantLabelKey := .Values.global.tenantLabelKey | default "x0tta.io/tenant" -}}
{{- $controlNamespace := .Values.global.controlNamespace | default "x0tta6bl4-control" -}}
{{- range .Values.tenants }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .namespace }}
  labels:
    {{ $tenantLabelKey }}: {{ .name | quote }}
    x0tta.io/tier: {{ .tier | quote }}
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .pqcKeyNamespace }}
  labels:
    {{ $tenantLabelKey }}: {{ .name | quote }}
    x0tta.io/purpose: pqc-keys
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ .name }}-quota
  namespace: {{ .namespace }}
spec:
  hard:
    pods: {{ .maxPods | default 200 | quote }}
    requests.cpu: {{ .requestsCPU | default "32" | quote }}
    requests.memory: {{ .requestsMemory | default "64Gi" | quote }}
    limits.cpu: {{ .limitsCPU | default "64" | quote }}
    limits.memory: {{ .limitsMemory | default "128Gi" | quote }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .serviceAccountName }}
  namespace: {{ .namespace }}
  labels:
    {{ $tenantLabelKey }}: {{ .name | quote }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-default-deny
  namespace: {{ .namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tenant-zero-lateral-movement
  namespace: {{ .namespace }}
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .namespace }}
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $controlNamespace }}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .namespace }}
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $controlNamespace }}
    - toEntities:
        - kube-apiserver
        - kube-dns
  enableDefaultDeny:
    ingress: true
    egress: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mesh-node-runtime
  namespace: {{ .namespace }}
rules:
  - apiGroups: ["x0tta6bl4.io"]
    resources: ["meshclusters"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps", "events"]
    verbs: ["get", "list", "watch", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mesh-node-runtime
  namespace: {{ .namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mesh-node-runtime
subjects:
  - kind: ServiceAccount
    name: {{ .serviceAccountName }}
    namespace: {{ .namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pqc-key-reader
  namespace: {{ .pqcKeyNamespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .pqcSecretName }}
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pqc-key-reader
  namespace: {{ .pqcKeyNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pqc-key-reader
subjects:
  - kind: ServiceAccount
    name: {{ .serviceAccountName }}
    namespace: {{ .namespace }}
{{- end }}
