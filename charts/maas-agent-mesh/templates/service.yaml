{{- if and .Values.agents.enabled .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maas-agent-mesh.fullname" . }}
  labels:
    {{- include "maas-agent-mesh.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "maas-agent-mesh.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
