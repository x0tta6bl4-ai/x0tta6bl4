---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "x0tta-mesh-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "x0tta-mesh-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "x0tta-mesh-operator.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      labels:
        {{- include "x0tta-mesh-operator.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
      {{- with .Values.operator.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "x0tta-mesh-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: manager
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /manager
          args:
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --leader-elect-namespace={{ include "x0tta-mesh-operator.leaderElectionNamespace" . }}
            - --metrics-bind-address=:{{ .Values.service.metricsPort }}
            - --health-probe-bind-address=:8081
            - --enable-webhooks={{ .Values.operator.webhook.enabled }}
            - --webhook-port={{ .Values.operator.webhook.port }}
            - --webhook-cert-dir={{ .Values.operator.webhook.certDir }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            {{- if .Values.operator.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.operator.webhook.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPERATOR_NAME
              value: {{ include "x0tta-mesh-operator.fullname" . }}
            {{- with .Values.operator.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.operator.webhook.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: {{ .Values.operator.webhook.certDir }}
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      {{- if .Values.operator.webhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "x0tta-mesh-operator.webhookSecretName" . }}
      {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
