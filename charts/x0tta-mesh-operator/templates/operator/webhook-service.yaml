{{- if .Values.operator.webhook.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "x0tta-mesh-operator.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "x0tta-mesh-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  selector:
    {{- include "x0tta-mesh-operator.selectorLabels" . | nindent 4 }}
    control-plane: controller-manager
  ports:
    - name: webhook
      port: {{ .Values.operator.webhook.service.port }}
      targetPort: webhook
      protocol: TCP
{{- end }}
