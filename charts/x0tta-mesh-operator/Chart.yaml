apiVersion: v2
name: x0tta-mesh-operator
description: |
  Kubernetes operator for x0tta6bl4 self-healing mesh clusters.
  Manages MeshCluster lifecycle with PQC eBPF security, adaptive fallback,
  SPIFFE/SPIRE identity, and DAO governance + Base Sepolia token bridge.
type: application
version: 3.4.0
appVersion: "3.4.0"
keywords:
  - mesh
  - pqc
  - ebpf
  - spiffe
  - zero-trust
  - dao
  - operator
home: https://github.com/x0tta6bl4/mesh
sources:
  - https://github.com/x0tta6bl4/mesh
maintainers:
  - name: x0tta6bl4
    email: ops@x0tta6bl4.mesh
annotations:
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: "Deep Insights"
  artifacthub.io/crdsExamples: |
    - apiVersion: x0tta6bl4.io/v1alpha1
      kind: MeshCluster
      metadata:
        name: demo-mesh
      spec:
        replicas: 3
        trustDomain: x0tta6bl4.mesh
