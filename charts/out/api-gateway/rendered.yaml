# Source: api-gateway/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-release-api-gateway
  namespace: default
  labels:
    helm.sh/chart: api-gateway-1.0.0
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/instance: test-release
    app: mesh-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: x0tta-mesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/instance: test-release
      app: mesh-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/instance: test-release
        app: mesh-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        checksum/config: 028bf8c6d743339e747ee24984f718b419800d17b89a01c69d944fda3bbaa39d
    spec:
      serviceAccountName: test-release-api-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: "registry.gitlab.com/x0tta/api-gateway:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
            - name: metrics
              containerPort: 9090
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: test-release-api-gateway-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: test-release-api-gateway-secrets
                  key: jwt-secret
            - name: MESH_API_URL
              value: "http://mesh-node.x0tta-production.svc"
            - name: LOG_LEVEL
              value: "info"
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: mesh-api
              topologyKey: kubernetes.io/hostname
            weight: 100
---
