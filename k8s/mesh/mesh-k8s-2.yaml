apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-k8s-2
  namespace: x0tta6bl4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mesh-node
      node: k8s-2
  template:
    metadata:
      labels:
        app: mesh-node
        node: k8s-2
    spec:
      containers:
      - name: mesh-node
        image: python:3.12-slim
        command: ["bash", "-c"]
        args:
        - |
          pip install -q aiohttp 2>/dev/null || true
          python3 /app/mesh_node.py
        env:
        - name: NODE_ID
          value: "k8s-2"
        - name: PEERS
          value: "k8s-1,k8s-3"
        - name: PEER_PORTS
          value: "9100,9100"
        - name: PORT
          value: "9100"
        - name: HTTP_PROXY
          value: ""
        - name: HTTPS_PROXY
          value: ""
        - name: NO_PROXY
          value: "*"
        - name: http_proxy
          value: ""
        - name: https_proxy
          value: ""
        - name: no_proxy
          value: "*"
        - name: SVD_BYPASS
          value: "true"
        ports:
        - containerPort: 9100
        volumeMounts:
        - name: code
          mountPath: /app
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9100
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 9100
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: code
        configMap:
          name: mesh-node-k8s-code
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: mesh-k8s-2
  namespace: x0tta6bl4
spec:
  selector:
    app: mesh-node
    node: k8s-2
  ports:
  - port: 9100
    targetPort: 9100
