services:
  ghost-vpn-server:
    build:
      context: .
      dockerfile: Dockerfile.vpn
    container_name: x0tta-ghost-vpn
    restart: unless-stopped
    ports:
      - "4433:4433/udp"
      - "4434:4434/tcp"
      - "4434:4434/udp"
      - "9464:9464/tcp"
    environment:
      GHOST_VPN_PORT: "4433"
      GHOST_PROBE_PORT: "4434"
      GHOST_SUBNET: ${GHOST_SUBNET:-10.200.0}
      GHOST_TUN_IP: ${GHOST_TUN_IP:-10.200.0.1}
      GHOST_VPN_AUTH_KEY: ${GHOST_VPN_AUTH_KEY:?set GHOST_VPN_AUTH_KEY}
      GHOST_MAX_CONNECTIONS: ${GHOST_MAX_CONNECTIONS:-1000}
      GHOST_IDLE_TIMEOUT: ${GHOST_IDLE_TIMEOUT:-300}
      GHOST_RATE_LIMIT: ${GHOST_RATE_LIMIT:-100}
      GHOST_METRICS_ENABLED: "1"
      GHOST_METRICS_HOST: 0.0.0.0
      GHOST_METRICS_PORT: "9464"
      GHOST_EVOLUTION_ENABLED: ${GHOST_EVOLUTION_ENABLED:-0}
      GHOST_KNOWLEDGE_DIR: /var/lib/ghost-vpn/knowledge
    volumes:
      - ghost-vpn-logs:/app/logs
      - ghost-vpn-knowledge:/var/lib/ghost-vpn/knowledge
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9464/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      ghost-vpn:
        ipv4_address: 10.9.0.10

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: x0tta-ghost-vpn-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ghost-vpn

  grafana:
    image: grafana/grafana:11.2.0
    container_name: x0tta-ghost-vpn-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?set GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - ghost-vpn

  redis:
    image: redis:7.4-alpine
    container_name: x0tta-ghost-vpn-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - ghost-vpn

networks:
  ghost-vpn:
    driver: bridge
    ipam:
      config:
        - subnet: 10.9.0.0/24

volumes:
  ghost-vpn-logs:
  ghost-vpn-knowledge:
  prometheus-data:
  grafana-data:
  redis-data:
