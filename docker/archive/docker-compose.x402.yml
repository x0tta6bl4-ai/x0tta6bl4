services:
  x402-api:
    build:
      context: .
      dockerfile: Dockerfile.production-simple
    container_name: x402-api
    network_mode: "host"
    environment:
      - DATABASE_URL=sqlite:///./maas_prod_x402.db
      - X0TTA6BL4_PRODUCTION=true
      - MAAS_LIGHT_MODE=false
      - MAAS_TOKEN_SECRET=smoke-secret
      - STRIPE_SECRET_KEY=sk_test_smoke
      - VAULT_TOKEN=smoke-token
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: x402-ngrok
    network_mode: "host"
    environment:
      - NGROK_AUTHTOKEN=35ns6PprwuARMxQHaM53IXpW0wA_3M5qc3k3RmDiQKr9Z5fu9
    command: "http 8000"
    restart: always