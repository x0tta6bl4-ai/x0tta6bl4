services:
  x0tta6bl4-app:
    build:
      context: .
      dockerfile: x0tta6bl4-app/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    container_name: x0tta6bl4-app
    restart: always
    network_mode: host # Direct access to server network
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - .:/mnt/projects:ro
    environment:
      NODE_ENV: production
      PROJECT_ROOT: /mnt/projects
      PORT: "8081"
      CORE_API_HOST: localhost
      CORE_API_PORT: "8083"
      VITE_API_BASE: ${VITE_API_BASE:-/api}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      ADMIN_USER: ${ADMIN_USER:?set ADMIN_USER}
      ADMIN_PASS: ${ADMIN_PASS:?set ADMIN_PASS}
