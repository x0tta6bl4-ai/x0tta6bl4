apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mesh-pqc-keys
  namespace: x0tta6bl4-mesh
spec:
  encryptedData:
    ml-kem-current-public: AgAAA_REPLACE_WITH_SEALED_VALUE
    ml-kem-current-private: AgAAA_REPLACE_WITH_SEALED_VALUE
    ml-kem-previous-public: AgAAA_REPLACE_WITH_SEALED_VALUE
    ml-kem-previous-private: AgAAA_REPLACE_WITH_SEALED_VALUE
    ml-dsa-current-public: AgAAA_REPLACE_WITH_SEALED_VALUE
    ml-dsa-current-private: AgAAA_REPLACE_WITH_SEALED_VALUE
    ml-dsa-previous-public: AgAAA_REPLACE_WITH_SEALED_VALUE
    ml-dsa-previous-private: AgAAA_REPLACE_WITH_SEALED_VALUE
    ntru-backup-public: AgAAA_REPLACE_WITH_SEALED_VALUE
    ntru-backup-private: AgAAA_REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: mesh-pqc-keys
      namespace: x0tta6bl4-mesh
      labels:
        app.kubernetes.io/name: x0tta6bl4-agent
        app.kubernetes.io/component: pqc-keys
    type: Opaque
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pqc-rotation-policy
  namespace: x0tta6bl4-mesh
data:
  policy.yaml: |
    kem_rotation_interval: 720h
    signature_rotation_interval: 2160h
    overlap_period: 168h
    backup_algorithm: NTRU-HRSS-701
