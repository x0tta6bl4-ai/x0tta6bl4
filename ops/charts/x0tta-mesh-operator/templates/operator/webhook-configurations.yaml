{{- if .Values.operator.webhook.enabled }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "x0tta-mesh-operator.fullname" . }}-mutating
  labels:
    {{- include "x0tta-mesh-operator.labels" . | nindent 4 }}
  {{- if .Values.operator.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "x0tta-mesh-operator.webhookCertificateName" . }}
  {{- end }}
webhooks:
  - name: mmeshcluster.x0tta6bl4.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: {{ .Values.operator.webhook.timeoutSeconds }}
    failurePolicy: {{ .Values.operator.webhook.failurePolicy }}
    matchPolicy: Equivalent
    reinvocationPolicy: IfNeeded
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "x0tta-mesh-operator.webhookServiceName" . }}
        path: /mutate-x0tta6bl4-io-v1alpha1-meshcluster
        port: {{ .Values.operator.webhook.service.port }}
      {{- if and (not .Values.operator.webhook.certManager.enabled) .Values.operator.webhook.tls.caBundle }}
      caBundle: {{ .Values.operator.webhook.tls.caBundle | quote }}
      {{- end }}
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["x0tta6bl4.io"]
        apiVersions: ["v1alpha1"]
        resources: ["meshclusters"]
        scope: Namespaced

---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "x0tta-mesh-operator.fullname" . }}-validating
  labels:
    {{- include "x0tta-mesh-operator.labels" . | nindent 4 }}
  {{- if .Values.operator.webhook.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "x0tta-mesh-operator.webhookCertificateName" . }}
  {{- end }}
webhooks:
  - name: vmeshcluster.x0tta6bl4.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: {{ .Values.operator.webhook.timeoutSeconds }}
    failurePolicy: {{ .Values.operator.webhook.failurePolicy }}
    matchPolicy: Equivalent
    clientConfig:
      service:
        namespace: {{ .Release.Namespace }}
        name: {{ include "x0tta-mesh-operator.webhookServiceName" . }}
        path: /validate-x0tta6bl4-io-v1alpha1-meshcluster
        port: {{ .Values.operator.webhook.service.port }}
      {{- if and (not .Values.operator.webhook.certManager.enabled) .Values.operator.webhook.tls.caBundle }}
      caBundle: {{ .Values.operator.webhook.tls.caBundle | quote }}
      {{- end }}
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["x0tta6bl4.io"]
        apiVersions: ["v1alpha1"]
        resources: ["meshclusters"]
        scope: Namespaced
{{- end }}
