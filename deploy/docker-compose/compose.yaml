services:
  spire-server:
    image: spire-server:latest
    container_name: spire-server
    hostname: spire-server
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      mesh-net:
        aliases:
          - spire-server
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('127.0.0.1',8081),2).close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  spire-agent:
    image: spire-agent:latest
    container_name: spire-agent
    hostname: spire-agent
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=*
      - http_proxy=
      - https_proxy=
      - no_proxy=*
      - SPIRE_SERVER_ADDRESS=spire-server
    volumes:
      - spire-socket:/tmp/spire-agent
      - ./spire-agent.conf:/etc/spire/agent.conf:ro
    networks:
      mesh-net:
        aliases:
          - spire-agent
    depends_on:
      spire-server:
        condition: service_healthy

  mesh-node:
    image: mesh-node:latest
    container_name: mesh-node
    hostname: mesh-node
    ports:
      - "127.0.0.1:9190:9090"
    environment:
      - NODE_ID=mesh-node
      - PEERS=mesh-node-2
      - PEER_PORTS=9103
      - PORT=9100
      - MESH_METRICS_PORT=9090
      - SVD_BYPASS=true
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=*
      - http_proxy=
      - https_proxy=
      - no_proxy=*
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
    volumes:
      - spire-socket:/tmp/spire-agent:ro
    networks:
      mesh-net:
        aliases:
          - mesh-node
      x0tmq-net:
        aliases:
          - mesh-node
    depends_on:
      spire-agent:
        condition: service_started
      vault:
        condition: service_healthy

  mesh-node-2:
    image: mesh-node:latest
    container_name: mesh-node-2
    hostname: mesh-node-2
    ports:
      - "127.0.0.1:9191:9090"
    environment:
      - NODE_ID=mesh-node-2
      - PEERS=mesh-node
      - PEER_PORTS=9100
      - PORT=9103
      - MESH_METRICS_PORT=9090
      - SVD_BYPASS=true
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=*
      - http_proxy=
      - https_proxy=
      - no_proxy=*
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root
    volumes:
      - spire-socket:/tmp/spire-agent:ro
    networks:
      mesh-net:
        aliases:
          - mesh-node-2
      x0tmq-net:
        aliases:
          - mesh-node-2
    depends_on:
      mesh-node:
        condition: service_started
      vault:
        condition: service_healthy

  node-nl-bridge:
    image: mesh-node:latest
    container_name: mesh-node-nl-bridge
    hostname: node-nl-bridge
    environment:
      - NODE_ID=node-nl-bridge
      - PEERS=mesh-node,mesh-node-2,89.125.1.107
      - PEER_PORTS=9100,9103,9101
      - PORT=9102
      - MESH_METRICS_PORT=9090
      - SVD_BYPASS=true
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=*
      - http_proxy=
      - https_proxy=
      - no_proxy=*
    volumes:
      - spire-socket:/tmp/spire-agent:ro
    networks:
      mesh-net:
        aliases:
          - node-nl-bridge
    depends_on:
      - mesh-node

  spire-agent-nl:
    image: spire-agent:latest
    container_name: spire-agent-nl
    hostname: spire-agent-nl
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=*
      - http_proxy=
      - https_proxy=
      - no_proxy=*
    command: ["spire-agent", "run", "-config", "/etc/spire/agent-nl.conf"]
    volumes:
      - ./spire-agent-nl.conf:/etc/spire/agent-nl.conf:ro
      - spire-socket-nl:/tmp/spire-agent
    networks:
      mesh-net:
        aliases:
          - spire-agent-nl
    restart: always

  vault:
    image: hashicorp/vault:1.15.2
    container_name: vault
    hostname: vault
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    networks:
      mesh-net:
        aliases:
          - vault
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  spire-socket:
  spire-socket-nl:

networks:
  mesh-net:
    driver: bridge
  x0tmq-net:
    driver: bridge
    internal: true
