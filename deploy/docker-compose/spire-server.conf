server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "x0tta6bl4.mesh"
    data_dir = "/var/lib/spire/server"
    log_level = "INFO"
    ca_ttl = "168h"
    default_x509_svid_ttl = "24h"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/var/lib/spire/server/datastore.sqlite3"
        }
    }
    KeyManager "memory" {
        plugin_data {}
    }
    NodeAttestor "join_token" {
        plugin_data {}
    }
}
