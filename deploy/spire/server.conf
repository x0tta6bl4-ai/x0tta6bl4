server {
    trust_domain = "x0tta6bl4.mesh"
    bind_address = "0.0.0.0"
    bind_port = "8081"
    data_dir = "/opt/spire/data/server"
    log_level = "WARN"
    log_file = "/opt/spire/logs/server.log"

    jwt_issuer = "https://spire.x0tta6bl4.mesh"

    upstream_authority "disk" {
        config {
            key_file_path = "/opt/spire/secrets/intermediate-key.pem"
            cert_file_path = "/opt/spire/secrets/intermediate-cert.pem"
        }
    }

    federation {
        bundle_endpoint {
            address = "0.0.0.0"
            port = 8443
        }
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }
}
