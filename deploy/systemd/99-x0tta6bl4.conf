# x0tta6bl4 production sysctl settings
# Deploy to /etc/sysctl.d/99-x0tta6bl4.conf

# Auto-reboot on kernel panic (10 seconds)
kernel.panic = 10

# Panic on OOM (better than undefined hang)
vm.panic_on_oom = 1

# Increase max open files
fs.file-max = 65536

# Network tuning for mesh traffic
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
